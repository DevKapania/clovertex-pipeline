name: Clovertex Pipeline CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff lint
        run: ruff check pipeline/ --ignore E501,F401,E712,W291,W293,E302,E303,F841,E711

      - name: Run ruff format check
        run: ruff format --check pipeline/ || true

  docker-build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t clovertex-pipeline:ci .

      - name: Verify image exists
        run: docker image inspect clovertex-pipeline:ci